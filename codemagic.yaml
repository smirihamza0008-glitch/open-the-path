workflows:
  android-workflow:
    name: Open The Path Optimized Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      # قمنا برفع الإصدار إلى 3.13.0 بدقة لتلبية شرط مكتبة Flame وتجنب أخطاء الإصدارات الأحدث
      flutter: 3.13.0
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Force Clear Cache & Clean Project
        script: |
          rm -rf android/.gradle
          rm -rf ~/.gradle/caches
          flutter clean
      - name: Configure Java Environment & Local Properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
      - name: Fetch Flutter Dependencies
        script: |
          flutter pub get
      - name: Execute Autonomous Android Release Build
        script: |
          flutter build apk --release --no-pub
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
