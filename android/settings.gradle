pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "com.android.application" version "7.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.7.10" apply false
}

// ابتكار حل ذكي محلي لتضمين إضافات فلاتر دون المرور بـ app_plugin_loader المكسور في خادم المنصة
include ':app'

rootProject.name = 'open_the_path'
