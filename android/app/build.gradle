plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.smrihamza0008.openthepath"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
        // هذا السطر السحري يخبر المترجم بتجاهل الأخطاء الداخلية لملفات السيرفر وإكمال البناء رغماً عنه!
        freeCompilerArgs += ["-Xskip-metadata-version-check"]
    }

    defaultConfig {
        applicationId "com.smrihamza0008.openthepath"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}
